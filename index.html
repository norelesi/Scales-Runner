<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#050505">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icona.png">
  <title>SCALES RUNNER</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <style>
    :root { --neon: #0ff; --pink: #f0f; --bg: #050505; --red: #ff4444; --green: #00ff66; --yellow: #ffcc00; --orange: #ff8800; }
    * { 
      box-sizing: border-box; 
      user-select: none; 
      touch-action: none; 
      font-family: 'Courier New', monospace;
      -webkit-tap-highlight-color: transparent; 
    }
    body { margin: 0; min-height: 100vh; overflow-y: auto; background: var(--bg); color: var(--neon); display: flex; justify-content: center; align-items: center; padding: 10px 0; }
    
    .synth-case { 
      width: 95%; max-width: 480px; padding: 12px; 
      background: #0a0a0a; border: 2px solid var(--neon); border-radius: 15px; 
      display: flex; flex-direction: column; position: relative;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .header-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    button { padding: 8px 4px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 1px solid; background: #111; font-size: 0.6rem; }
    .btn-off { border-color: var(--red); color: var(--red); }
    .btn-on { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px var(--green); }
    #genBtn { border-color: var(--pink); color: var(--pink); }
    #restoreBtn { border-color: var(--orange); color: var(--orange); }

    .display-box { background: #000; border: 1px solid var(--neon); border-radius: 8px; padding: 5px; text-align: center; margin-bottom: 8px; }
    .note-val { font-size: 1.1rem; color: var(--neon); text-shadow: 0 0 8px var(--neon); height: 1.3rem; }
    #feelDisp { font-size: 0.7rem; color: var(--pink); min-height: 2.2em; line-height: 1.2; padding: 0 5px; }

    .selectors { display: grid; grid-template-columns: 1fr; gap: 4px; margin-bottom: 8px; }
    .sel-group { display: grid; grid-template-columns: 70px 1fr; gap: 5px; align-items: center; }
    label { font-size: 0.4rem; color: #444; text-transform: uppercase; }
    select { background: #111; color: var(--neon); border: 1px solid #333; padding: 4px; font-size: 0.65rem; outline: none; border-radius: 4px; }

    #circle-wrap { position: relative; width: 65px; height: 65px; margin: 0 auto 8px; }
    .circle-note { position: absolute; width: 17px; height: 17px; line-height: 17px; text-align: center; font-size: 0.45rem; font-weight: bold; color: #1a1a1a; border-radius: 50%; transform: translate(-50%, -50%); }
    .note-available { color: #008888; text-shadow: 0 0 5px var(--neon); }
    .note-active { color: var(--yellow) !important; transform: translate(-50%, -50%) scale(1.3); z-index: 10; text-shadow: 0 0 10px var(--yellow); }

    #keyboard-wrap { width: 100%; height: 120px; margin-bottom: 8px; display: flex; position: relative; background: #000; border: 1px solid #333; border-radius: 8px; overflow: hidden; }
    .key { flex: 1; border-right: 1px solid #000; position: relative; transition: background 0.05s; cursor: pointer; }
    .key.white { background: #eee; z-index: 1; }
    .key.black { background: #111; height: 62%; width: 7.2%; position: absolute; z-index: 2; margin-left: -3.6%; border: 1px solid #444; border-radius: 0 0 4px 4px; }
    .key-available-w { background: #aadddd !important; }
    .key-available-b { background: #006666 !important; }
    .key-active { background: var(--yellow) !important; z-index: 3; box-shadow: inset 0 0 20px rgba(0,0,0,0.6); }

    #chords-wrap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 8px; }
    .chord-card { background: #000; border: 1px solid #1a1a1a; padding: 4px 0; text-align: center; font-size: 0.35rem; color: #444; border-radius: 3px; }
    .chord-card span { display: block; font-weight: bold; color: var(--neon); font-size: 0.45rem; }

    .slider-block { display: flex; flex-direction: column; gap: 4px; }
    .control-group { background: #000; padding: 4px 8px; border-radius: 6px; border: 1px solid #111; }
    .label-row { display: flex; justify-content: space-between; font-size: 0.45rem; color: #666; margin-bottom: 2px; }
    input[type=range] { width: 100%; height: 10px; accent-color: var(--pink); cursor: pointer; }

    .signature-box { text-align: center; margin-top: 12px; padding-bottom: 2px; }
    .brand-name { font-size: 0.8rem; letter-spacing: 4px; color: var(--neon); font-weight: bold; text-transform: uppercase; }
    .author-name { font-size: 0.4rem; letter-spacing: 2px; color: var(--pink); opacity: 0.7; margin-top: 1px; text-transform: uppercase; }
  </style>
</head>
<body>

<div class="synth-case">
  <div class="header-btns">
    <button id="powerBtn" class="btn-on">START</button>
    <button id="genBtn">GENERATE</button>
    <button id="restoreBtn">RESTORE</button>
  </div>

  <div class="display-box">
    <div id="noteDisp" class="note-val">---</div>
    <div id="feelDisp">Scales Runner Ready</div>
  </div>

  <div class="selectors">
    <div class="sel-group"><label>ROOT</label><select id="rootSelect">
      <option value="0">C</option><option value="1">C#</option><option value="2">D</option><option value="3">D#</option><option value="4">E</option><option value="5">F</option><option value="6">F#</option><option value="7">G</option><option value="8">G#</option><option value="9">A</option><option value="10">A#</option><option value="11">B</option>
    </select></div>
    <div class="sel-group"><label>MODI</label><select id="modeSelect"><option value="none">-- Seleziona Modo --</option></select></div>
    <div class="sel-group"><label>SCALE</label><select id="scaleSelect"><option value="none">-- Seleziona Scala --</option></select></div>
  </div>

  <div id="circle-wrap"></div>
  <div id="keyboard-wrap"></div>
  <div id="chords-wrap"></div>

  <div class="slider-block">
    <div class="control-group"><div class="label-row"><span>⚡ BPM</span><span id="bpmVal">110</span></div><input type="range" id="bpmSlider" min="60" max="180" value="110"></div>
    <div class="control-group"><div class="label-row"><span>🌌 REVERB</span><span id="fxVal">0%</span></div><input type="range" id="fxSlider" min="0" max="0.6" step="0.01" value="0"></div>
    <div class="control-group"><div class="label-row"><span>🌀 WOBBLE</span><span id="wobbleVal">0%</span></div><input type="range" id="wobbleSlider" min="0" max="1" step="0.01" value="0"></div>
  </div>

  <div class="signature-box">
    <div class="brand-name">Scales Runner</div>
    <div class="author-name">MADE BY NORELESI</div>
  </div>
</div>
<script>
  "use strict";
  let synth, reverb, filter, lfo, loop, isPlaying = false, currentSeq = [], step = 0, currentPlayedNote = null;
  const chromatic = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
  const circleOrder = ["C", "G", "D", "A", "E", "B", "F#", "C#", "G#", "D#", "A#", "F"];
  const noteElements = {}, keyElements = {};

  const modesDb = {
    "Ionico": { i: [0,2,4,5,7,9,11], f: "I grado. Solare, stabile e maestoso." },
    "Eolio": { i: [0,2,3,5,7,8,10], f: "VI grado. Triste, narrativo e malinconico." },
    "Dorico": { i: [0,2,3,5,7,9,10], f: "II grado. Sapore Jazz, Folk e misterioso." },
    "Frigio": { i: [0,1,3,5,7,8,10], f: "III grado. Oscurità spagnola, teso e cupo." },
    "Lidio": { i: [0,2,4,6,7,9,11], f: "IV grado. Celestiale, sognante e magico." },
    "Misolidio": { i: [0,2,4,5,7,9,10], f: "V grado. Gusto Blues, Rock e solido." },
    "Locrio": { i: [0,1,3,5,6,8,10], f: "VII grado. Estremamente instabile e dissonante." },
    "Lidio Dominante": { i: [0,2,4,6,7,9,10], f: "IV grado Min. Melodica. Fusion e moderno." },
    "Superlocrio": { i: [0,1,3,4,6,8,10], f: "VII grado Min. Melodica. Tensione massima." },
    "Mixolydian b6": { i: [0,2,4,5,7,8,10], f: "V grado Min. Melodica. Malinconia sognante." },
    "Dorian b2": { i: [0,1,3,5,7,9,10], f: "II grado Min. Melodica. Sofisticato e jazz." },
    "Lidio Aumentato": { i: [0,2,4,6,8,9,11], f: "III grado Min. Melodica. Astratto e aperto." },
    "Locrio #2": { i: [0,2,3,5,6,8,10], f: "VI grado Min. Melodica. Mezzo-diminuito." },
    "Dorian #4": { i: [0,2,3,6,7,9,10], f: "IV grado Min. Armonica. Sapore rumeno." },
    "Frigio Maggiore": { i: [0,1,4,5,7,8,10], f: "V grado Min. Armonica. Flamenco e passione." },
    "Lidio #2": { i: [0,3,4,6,7,9,11], f: "VI grado Min. Armonica. Esotico e luminoso." }
  };

  const scalesDb = {
    "Maggiore": { i: [0,2,4,5,7,9,11], f: "La base della musica occidentale." },
    "Minore Naturale": { i: [0,2,3,5,7,8,10], f: "L'essenza del sentimento malinconico classico." },
    "Napoletana Maggiore": { i: [0,1,3,5,7,9,11], f: "Rara e nobile. Sapore mediterraneo aperto." },
    "Napoletana Minore": { i: [0,1,3,5,7,8,11], f: "Drammatica. La Napoli classica e scura." },
    "Minore Armonica": { i: [0,2,3,5,7,8,11], f: "Gusto neoclassico, drammatico e horror." },
    "Minore Melodica": { i: [0,2,3,5,7,9,11], f: "La scala raffinata del Jazz moderno." },
    "Doppia Armonica (Bizantina)": { i: [0,1,4,5,7,8,11], f: "Ipnotica, regale e sapore arabo." },
    "Ungherese Minore": { i: [0,2,3,6,7,8,11], f: "Passionale e zingaresca. Molto espressiva." },
    "Persiana": { i: [0,1,4,5,6,8,11], f: "Mistero assoluto e profondo d'oriente." },
    "Giapponese (Akebono)": { i: [0,2,3,7,8], f: "Meditativa, Zen, sapore di natura." },
    "Giapponese (In-Sen)": { i: [0,1,5,7,10], f: "Suono tradizionale del Koto." },
    "Cinese": { i: [0,2,4,7,9], f: "Pentatonica Maggiore. Antica e pura." },
    "Pentatonica Minore": { i: [0,3,5,7,10], f: "Rock, Blues, universale." },
    "Pentatonica Blues": { i: [0,3,5,6,7,10], f: "Il colore sporco e viscerale del Blues." },
    "Bebop Maggiore": { i: [0,2,4,5,7,8,9,11], f: "Swing e virtuosismo Jazz anni '40." },
    "Bebop Dominante": { i: [0,2,4,5,7,9,10,11], f: "Linguaggio fluido di Charlie Parker." },
    "Diminuita (T-S)": { i: [0,2,3,5,6,8,9,11], f: "Simmetria tesa. Atmosfere da Film Noir." },
    "Esatonale": { i: [0,2,4,6,8,10], f: "Onirica, fluttuante e senza centro." },
    "Prometeo": { i: [0,2,4,6,9,10], f: "Scriabin. Mistica e sapore cosmico." },
    "Enigmatica": { i: [0,1,4,6,8,10,11], f: "Verdi. Sperimentale e oltre le regole." },
    "Otto Toni (S-T)": { i: [0,1,3,4,6,7,9,10], f: "Simmetrica, scura e molto tesa." },
    "Flamenco": { i: [0,1,4,5,7,8,10,11], f: "Danza, fuoco e orgoglio andaluso." },
    "Araba": { i: [0,2,4,5,6,8,10], f: "Atmosfere calde mediorientali." },
    "Indiana (Todi)": { i: [0,1,3,6,7,8,11], f: "Spirituale, profonda e devozionale." },
    "Oltretomba": { i: [0,1,3,4,6,7,9,10], f: "Sinistra, aliena e inquietante." }
  };

  // UI Setup
  const cWrap = document.getElementById('circle-wrap');
  circleOrder.forEach((note, i) => {
    const el = document.createElement('div'); el.className = 'circle-note'; el.textContent = note;
    const angle = (i * 30 - 90) * (Math.PI / 180);
    el.style.left = (32.5 + 30 * Math.cos(angle)) + 'px'; el.style.top = (32.5 + 30 * Math.sin(angle)) + 'px';
    cWrap.appendChild(el); noteElements[note] = el;
  });

  const kWrap = document.getElementById('keyboard-wrap');
  const pianoLayout = [ {n:"C",b:0},{n:"C#",b:1},{n:"D",b:0},{n:"D#",b:1},{n:"E",b:0},{n:"F",b:0},{n:"F#",b:1},{n:"G",b:0},{n:"G#",b:1},{n:"A",b:0},{n:"A#",b:1},{n:"B",b:0},{n:"C",b:0},{n:"C#",b:1},{n:"D",b:0},{n:"D#",b:1},{n:"E",b:0},{n:"F",b:0} ];
  pianoLayout.forEach((note, i) => {
    const key = document.createElement('div'); 
    const fullNote = note.n + (i < 12 ? 4 : 5);
    key.className = `key ${note.b ? 'black' : 'white'}`;
    if(note.b) key.style.left = (kWrap.querySelectorAll('.white').length * (100/11)) + "%";
    kWrap.appendChild(key); 
    keyElements[fullNote] = key;

    key.onpointerdown = async (e) => {
      e.preventDefault();
      if (!isPlaying) {
        await checkInit();
        if (currentPlayedNote && currentPlayedNote !== fullNote) {
          synth.triggerRelease();
          highlight(currentPlayedNote, false);
        }
        synth.triggerAttack(fullNote);
        highlight(fullNote, true);
        noteDisp.textContent = fullNote;
        currentPlayedNote = fullNote;
      }
    };

    key.onpointerup = key.onpointerleave = () => {
      if (!isPlaying && synth && currentPlayedNote === fullNote) {
        synth.triggerRelease();
        highlight(fullNote, false);
        currentPlayedNote = null;
      }
    };
  });

  const mSel = document.getElementById('modeSelect'), sSel = document.getElementById('scaleSelect'), rSel = document.getElementById('rootSelect');
  for (let m in modesDb) mSel.add(new Option(m, m));
  for (let s in scalesDb) sSel.add(new Option(s, s));

  // Audio Logic
  async function checkInit() {
    if (Tone.context.state !== 'running') await Tone.start();
    if (!synth) await initAudio();
  }

  async function initAudio() {
    const limiter = new Tone.Limiter(-1).toDestination();
    reverb = new Tone.Freeverb({ roomSize: 0.7, wet: parseFloat(document.getElementById('fxSlider').value) }).connect(limiter);
    filter = new Tone.Filter(1500, "lowpass").connect(reverb);
    lfo = new Tone.LFO("4n", 400, 4000).connect(filter.frequency);
    lfo.amplitude.value = parseFloat(document.getElementById('wobbleSlider').value); 
    lfo.start();
    synth = new Tone.MonoSynth({ 
      oscillator: { type: "sawtooth" }, 
      envelope: { attack: 0.04, decay: 0.2, sustain: 0.4, release: 0.8 }, 
      volume: -3
    }).connect(filter);

    synth.triggerAttack("C4", undefined, 0);

    loop = new Tone.Loop(time => {
      let n = currentSeq[step % currentSeq.length];
      if(n) { 
        synth.triggerAttackRelease(n, "16n", time); 
        Tone.Draw.schedule(() => { noteDisp.textContent = n; highlight(n, true); }, time); 
        Tone.Draw.schedule(() => { highlight(n, false); }, time + 0.1); 
      }
      step++;
    }, "8n").start(0);
  }

  function generateMelody() {
    const rootIdx = parseInt(rSel.value);
    let intervals = mSel.value !== "none" ? modesDb[mSel.value].i : (sSel.value !== "none" ? scalesDb[sSel.value].i : [0,2,4,5,7,9,11]);
    const pool = [];
    [48, 60].forEach(octIdx => { 
      intervals.forEach(d => { 
        let n = Tone.Frequency(rootIdx + octIdx + d, "midi").toNote(); 
        if(keyElements[n]) pool.push(n); 
      }); 
    });
    currentSeq = Array.from({ length: 16 }, (v, i) => (i % 4 === 0 || Math.random() > 0.5) ? pool[Math.floor(Math.random() * pool.length)] : null);
    step = 0;
  }

  function updateVisuals() {
    Object.values(noteElements).forEach(el => el.classList.remove('note-available'));
    Object.values(keyElements).forEach(el => el.classList.remove('key-available-w', 'key-available-b'));
    const root = parseInt(rSel.value);
    let data = (mSel.value !== "none") ? modesDb[mSel.value] : (sSel.value !== "none" ? scalesDb[sSel.value] : modesDb["Ionico"]);
    document.getElementById('feelDisp').textContent = data.f;
    
    let scaleNotes = [];
    data.i.forEach(interval => {
      const midi = (root + interval) % 12; 
      const name = chromatic[midi];
      scaleNotes.push({ name, midi });
      if(noteElements[name]) noteElements[name].classList.add('note-available');
      [4, 5].forEach(oct => { 
        if(keyElements[name+oct]) keyElements[name+oct].classList.add(name.includes('#')?'key-available-b':'key-available-w'); 
      });
    });

    const chWrap = document.getElementById('chords-wrap'); 
    chWrap.innerHTML = "";
    if(scaleNotes.length >= 3) {
      for(let i=0; i<Math.min(scaleNotes.length, 7); i++) {
        const r = scaleNotes[i], t = scaleNotes[(i+2)%scaleNotes.length], q = scaleNotes[(i+4)%scaleNotes.length];
        const d3 = (t.midi - r.midi + 12) % 12, d5 = (q.midi - r.midi + 12) % 12;
        let type = (d3===4 && d5===7)?"Maj":(d3===3 && d5===7)?"min":(d3===3 && d5===6)?"dim":"sus";
        const card = document.createElement('div'); 
        card.className = "chord-card";
        card.innerHTML = (i+1) + '<span>' + r.name + type + '</span>';
        chWrap.appendChild(card);
      }
    }
  }

  const powerBtn = document.getElementById('powerBtn');
  const genBtn = document.getElementById('genBtn');
  const restoreBtn = document.getElementById('restoreBtn');
  const bpmSlider = document.getElementById('bpmSlider');
  const fxSlider = document.getElementById('fxSlider');
  const wobbleSlider = document.getElementById('wobbleSlider');
  const bpmVal = document.getElementById('bpmVal');
  const fxVal = document.getElementById('fxVal');
  const wobbleVal = document.getElementById('wobbleVal');
  const noteDisp = document.getElementById('noteDisp');
  const feelDisp = document.getElementById('feelDisp');

  powerBtn.onclick = async () => {
    await checkInit();
    if(!isPlaying) { 
      generateMelody(); 
      Tone.Transport.start(); 
      isPlaying = true; 
      powerBtn.textContent = "STOP"; 
      powerBtn.className = "btn-off"; 
    } 
    else { 
      Tone.Transport.stop(); 
      if(synth) synth.triggerRelease(); 
      isPlaying = false; 
      powerBtn.textContent = "START"; 
      powerBtn.className = "btn-on"; 
      currentPlayedNote = null;
    }
  };

  genBtn.onclick = async () => { 
    await checkInit(); 
    generateMelody(); 
    if(!isPlaying) powerBtn.click(); 
  };
  restoreBtn.onclick = () => location.reload();

  function highlight(note, active) {
    let pure = note.replace(/[0-9]/g, '');
    if(active) { 
      if(noteElements[pure]) noteElements[pure].classList.add('note-active'); 
      if(keyElements[note]) keyElements[note].classList.add('key-active'); 
    } 
    else { 
      if(noteElements[pure]) noteElements[pure].classList.remove('note-active'); 
      if(keyElements[note]) keyElements[note].classList.remove('key-active'); 
    }
  }

  mSel.onchange = () => { sSel.value = "none"; updateVisuals(); if(isPlaying) generateMelody(); };
  sSel.onchange = () => { mSel.value = "none"; updateVisuals(); if(isPlaying) generateMelody(); };
  rSel.onchange = () => { updateVisuals(); if(isPlaying) generateMelody(); };
  bpmSlider.oninput = (e) => { 
    Tone.Transport.bpm.value = e.target.value; 
    bpmVal.textContent = e.target.value; 
  };
  fxSlider.oninput = (e) => { 
    if(reverb) reverb.wet.value = e.target.value; 
    fxVal.textContent = Math.round(e.target.value*100)+"%"; 
  };
  wobbleSlider.oninput = (e) => { 
    if(lfo) lfo.amplitude.value = e.target.value; 
    wobbleVal.textContent = Math.round(e.target.value*100)+"%"; 
  };

  // Fix per cambio scheda / background
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
      if (Tone.context.state !== 'running') await Tone.context.resume();
      await checkInit();
      if (isPlaying && Tone.Transport.state !== 'started') {
        Tone.Transport.start();
      }
      if (synth) {
        synth.triggerAttack("C4", undefined, 0);
      }
    }
  });

  updateVisuals();
</script>
</body>
</html>
